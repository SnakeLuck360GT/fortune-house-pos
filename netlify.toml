[build]
  command = "npm run build"
  publish = "dist"
  functions = "./.netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/print"
  to = "/.netlify/functions/api/print"
  status = 200

[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/api/jobs"
  status = 200

[[redirects]]
  from = "/api/complete"
  to = "/.netlify/functions/api/complete"
  status = 200

[[redirects]]
  from = "/api/fail"
  to = "/.netlify/functions/api/fail"
  status = 200

[[redirects]]
  from = "/api/translate"
  to = "/.netlify/functions/api/translate"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
